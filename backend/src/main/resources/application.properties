spring.application.name=portfolio-backend
spring.config.import=optional:file:.env[.properties]
server.port=8080
server.error.include-message=never
server.error.include-binding-errors=never
spring.servlet.multipart.max-file-size=8MB
spring.servlet.multipart.max-request-size=8MB

# Required for admin endpoints (/api/admin/* and /api/resume/* status endpoints).
resume.assistant.admin-key=${RESUME_ASSISTANT_ADMIN_KEY:}
resume.assistant.rate-limit.ask.requests-per-minute=30
resume.assistant.rate-limit.contact.requests-per-minute=6
resume.assistant.cors.allowed-origins=${RESUME_ASSISTANT_CORS_ALLOWED_ORIGINS:http://localhost:5173}

resume.assistant.min-score-threshold=0.03
resume.assistant.zoswi-ai.api-key=${ZOSWI_AI_KEY:${OPENAI_API_KEY:}}
resume.assistant.zoswi-ai.model=${ZOSWI_AI_MODEL:${OPENAI_MODEL:gpt-4.1-mini}}
resume.assistant.zoswi-ai.base-url=${ZOSWI_AI_BASE_URL:${OPENAI_BASE_URL:https://api.openai.com}}
resume.assistant.zoswi-ai.temperature=0.2

# Optional: local resume file or folder to auto-index at startup (no UI upload needed).
# Supports .pdf, .docx, .txt, .md
# Example (file): resume.assistant.local-path=C:/Users/samhi/IdeaProjects/Portfolio/backend/resume/resume.docx
# Example (folder): resume.assistant.local-path=C:/Users/samhi/IdeaProjects/Portfolio/backend/resume
# If a folder is provided, the latest modified supported file is selected.
resume.assistant.local-path=resume

# Contact email (recipient stays backend-only).
portfolio.contact.recipient-email=${PORTFOLIO_CONTACT_RECIPIENT_EMAIL:samhithc1@gmail.com}
portfolio.contact.from-address=${PORTFOLIO_CONTACT_FROM_ADDRESS:onboarding@resend.dev}
portfolio.contact.resend.api-key=${RESEND_API_KEY:}
portfolio.contact.resend.base-url=${RESEND_BASE_URL:https://api.resend.com}
